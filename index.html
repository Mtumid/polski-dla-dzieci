<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polski dla dzieci 🇵🇱</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #fdf6ec;
      min-height: 100vh;
      padding: 1rem;
      color: #333;
    }
    .app { max-width: 600px; margin: 0 auto; }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
      padding: 1.25rem 1.5rem;
      border-radius: 16px;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-family: 'Fredoka One', cursive; font-size: 28px; color: #fff; }
    .header-sub { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 700; margin-top: 2px; }

    /* STATS BAR */
    .stats-bar {
      background: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 2px solid #f0f0f0;
    }
    .level-badge {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: #fff;
      border-radius: 8px;
      padding: 5px 11px;
      font-family: 'Fredoka One', cursive;
      font-size: 13px;
      white-space: nowrap;
    }
    .xp-bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .xp-label { display: flex; justify-content: space-between; font-size: 10px; color: #bbb; font-weight: 700; }
    .xp-bar { height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
    .xp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f39c12, #f1c40f);
      border-radius: 4px;
      transition: width 0.6s ease;
      min-width: 3px;
    }
    .streak-badge { white-space: nowrap; font-size: 14px; font-weight: 700; color: #e67e22; }

    /* NAV */
    .nav { display: flex; gap: 5px; margin-bottom: 0.75rem; }
    .nav-btn {
      flex: 1; padding: 10px 4px;
      border: 2px solid #ddd; border-radius: 10px;
      background: #fff; font-family: 'Nunito', sans-serif;
      font-size: 11px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; color: #555;
    }
    .nav-btn.active { background: #c0392b; color: #fff; border-color: #c0392b; }
    .nav-btn:hover:not(.active) { border-color: #c0392b; color: #c0392b; }

    /* TOPIC BAR */
    .topic-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .topic-btn {
      padding: 6px 10px;
      border-radius: 14px;
      border: 2px solid #eee;
      background: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      color: #666;
      white-space: nowrap;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 72px;
    }
    .topic-btn.active { background: #e67e22; color: #fff; border-color: #e67e22; }
    .topic-btn.complete:not(.active) { border-color: #27ae60; color: #27ae60; }
    .topic-btn:hover:not(.active) { border-color: #e67e22; }
    .topic-btn-text { font-size: 11px; display: flex; justify-content: space-between; align-items: center; gap: 3px; }
    .topic-prog-count { font-size: 9px; opacity: 0.8; }
    .topic-mini-bar { height: 3px; border-radius: 2px; background: rgba(0,0,0,0.08); overflow: hidden; }
    .topic-btn.active .topic-mini-bar { background: rgba(255,255,255,0.3); }
    .topic-mini-fill { height: 100%; border-radius: 2px; background: currentColor; transition: width 0.4s; }

    /* FLASHCARDS */
    .card-area { min-height: 260px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
    .flashcard {
      width: 100%; background: #fff;
      border-radius: 18px; border: 2px solid #f0f0f0;
      padding: 2rem 1.5rem; text-align: center;
      cursor: pointer; transition: transform 0.1s;
      box-shadow: 0 4px 0 #e0e0e0;
      position: relative;
    }
    .flashcard:hover { transform: translateY(-2px); }
    .flashcard:active { transform: translateY(2px); box-shadow: 0 1px 0 #e0e0e0; }
    .word-pl { font-family: 'Fredoka One', cursive; font-size: 52px; color: #c0392b; margin-bottom: 4px; }
    .word-hint { font-size: 15px; color: #bbb; font-style: italic; margin-bottom: 1rem; }
    .word-en { font-size: 24px; color: #27ae60; font-weight: 700; margin-top: 1rem; min-height: 34px; }
    .flip-hint { font-size: 12px; color: #ccc; margin-top: 1rem; }
    .mastered-star { position: absolute; top: 12px; right: 14px; font-size: 22px; opacity: 0.15; transition: opacity 0.2s; }
    .mastered-star.on { opacity: 1; }
    .speak-btn {
      background: none; border: 2px solid #f0d9d9; border-radius: 50%;
      width: 40px; height: 40px; font-size: 18px; cursor: pointer;
      transition: all 0.15s; margin-top: 0.5rem;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .speak-btn:hover { background: #fdecea; border-color: #c0392b; transform: scale(1.1); }
    .speak-btn:active { transform: scale(0.95); }

    .card-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .card-nav button {
      padding: 10px 22px; border-radius: 10px;
      border: 2px solid #ddd; background: #fff;
      font-family: 'Nunito', sans-serif; font-size: 14px;
      font-weight: 700; cursor: pointer; transition: all 0.15s; color: #555;
    }
    .card-nav button:hover { background: #c0392b; color: #fff; border-color: #c0392b; }
    .card-counter { font-size: 14px; color: #999; font-weight: 600; }

    .got-it-btn {
      width: 100%; padding: 12px; border-radius: 12px;
      border: 2px solid #eee; background: #fff;
      font-family: 'Nunito', sans-serif; font-size: 15px;
      font-weight: 700; cursor: pointer; transition: all 0.2s; color: #888;
    }
    .got-it-btn:hover { border-color: #f39c12; color: #f39c12; }
    .got-it-btn.on { background: #fef9e7; border-color: #f39c12; color: #e67e22; }

    /* QUIZ */
    .quiz-score { display: flex; gap: 12px; justify-content: center; margin-bottom: 1.5rem; }
    .score-pill { padding: 6px 18px; border-radius: 20px; font-size: 14px; font-weight: 700; }
    .score-right { background: #eafaf1; color: #27ae60; }
    .score-wrong { background: #fdedec; color: #e74c3c; }
    .quiz-q { font-family: 'Fredoka One', cursive; font-size: 40px; color: #c0392b; text-align: center; margin-bottom: 6px; }
    .quiz-sub { font-size: 14px; color: #bbb; text-align: center; margin-bottom: 1.5rem; font-style: italic; }
    .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    .quiz-opt {
      padding: 16px 10px; border: 2px solid #eee; border-radius: 12px;
      background: #fff; font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: all 0.15s; color: #444; text-align: center;
    }
    .quiz-opt:hover:not([disabled]) { border-color: #3498db; color: #3498db; }
    .quiz-opt.correct { background: #27ae60; color: #fff; border-color: #27ae60; }
    .quiz-opt.wrong { background: #e74c3c; color: #fff; border-color: #e74c3c; }
    .quiz-opt.reveal { background: #eafaf1; border-color: #27ae60; color: #27ae60; }
    .next-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: #3498db; color: #fff; font-family: 'Fredoka One', cursive;
      font-size: 22px; cursor: pointer; transition: background 0.15s; display: none;
    }
    .next-btn:hover { background: #2980b9; }

    /* MATCH */
    .match-col-label { font-size: 12px; font-weight: 700; color: #bbb; text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .match-col { display: flex; flex-direction: column; gap: 10px; }
    .match-btn {
      padding: 12px 10px; border: 2px solid #eee; border-radius: 10px;
      background: #fff; font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.15s; color: #444; text-align: center; width: 100%;
    }
    .match-btn:hover:not([disabled]) { border-color: #9b59b6; color: #9b59b6; }
    .match-btn.selected { border-color: #9b59b6; background: #9b59b6; color: #fff; }
    .match-btn.matched { background: #27ae60; color: #fff; border-color: #27ae60; opacity: 0.7; cursor: default; }
    .match-btn.wrong-shake { animation: shake 0.3s; border-color: #e74c3c; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .match-result {
      text-align: center; padding: 1.5rem;
      font-family: 'Fredoka One', cursive; font-size: 30px;
      color: #27ae60; display: none;
    }
    .reset-btn {
      margin-top: 1rem; width: 100%; padding: 10px;
      border-radius: 10px; border: 2px solid #eee; background: #fff;
      font-family: 'Nunito', sans-serif; font-size: 14px;
      font-weight: 700; cursor: pointer; color: #999;
    }
    .reset-btn:hover { border-color: #c0392b; color: #c0392b; }

    /* SCRAMBLE */
    .scram-prompt { font-family: 'Fredoka One', cursive; font-size: 38px; color: #c0392b; text-align: center; margin-bottom: 4px; }
    .scram-sub { font-size: 14px; color: #bbb; text-align: center; margin-bottom: 1.25rem; font-style: italic; }
    .scram-answer {
      display: flex; flex-wrap: wrap; gap: 5px;
      justify-content: center; margin-bottom: 1.25rem;
      min-height: 56px; align-items: center;
    }
    .scram-slot {
      width: 42px; height: 50px; border-radius: 10px;
      border: 2px dashed #ddd; background: #fafafa;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fredoka One', cursive; font-size: 20px;
      color: #c0392b; transition: all 0.15s;
    }
    .scram-slot.filled { border-style: solid; border-color: #c0392b; background: #fff5f5; cursor: pointer; }
    .scram-slot.filled:hover { background: #fde8e8; }
    .scram-slot.correct { background: #27ae60; border-color: #27ae60; color: #fff; cursor: default; }
    .scram-slot.wrong-col { background: #e74c3c; border-color: #e74c3c; color: #fff; cursor: default; }
    .scram-bank { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 1rem; min-height: 56px; }
    .scram-tile {
      width: 42px; height: 50px; border-radius: 10px;
      border: 2px solid #3498db; background: #ebf5fb;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fredoka One', cursive; font-size: 20px;
      color: #2980b9; cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .scram-tile:hover { background: #3498db; color: #fff; transform: translateY(-2px); }
    .scram-tile.used { opacity: 0.18; cursor: default; pointer-events: none; }
    .scram-feedback { text-align: center; font-family: 'Fredoka One', cursive; font-size: 26px; min-height: 38px; margin-bottom: 0.5rem; }

    /* MEDALS */
    .medals-header { text-align: center; margin-bottom: 1.25rem; }
    .medals-header h2 { font-family: 'Fredoka One', cursive; font-size: 26px; color: #c0392b; }
    .medals-header p { font-size: 13px; color: #bbb; margin-top: 4px; }
    .medals-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
    .medal-card {
      display: flex; align-items: center; gap: 14px;
      background: #fff; border: 2px solid #f0f0f0;
      border-radius: 12px; padding: 12px 16px;
    }
    .medal-card.unlocked { border-color: #f39c12; background: #fffbf0; }
    .medal-icon { font-size: 34px; line-height: 1; filter: grayscale(1); opacity: 0.25; flex-shrink: 0; }
    .medal-card.unlocked .medal-icon { filter: none; opacity: 1; }
    .medal-name { font-weight: 700; font-size: 15px; color: #888; }
    .medal-card.unlocked .medal-name { color: #333; }
    .medal-desc { font-size: 12px; color: #ccc; margin-top: 2px; }
    .medal-card.unlocked .medal-desc { color: #e67e22; }

    .topic-progress-section { background: #fff; border: 2px solid #f0f0f0; border-radius: 12px; padding: 14px 16px; }
    .topic-progress-section h3 { font-family: 'Fredoka One', cursive; font-size: 18px; color: #c0392b; margin-bottom: 10px; }
    .tp-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f5f5f5; }
    .tp-row:last-child { border-bottom: none; }
    .tp-label { font-size: 13px; font-weight: 600; color: #555; width: 120px; flex-shrink: 0; }
    .tp-bar-wrap { flex: 1; height: 7px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
    .tp-bar-fill { height: 100%; background: #27ae60; border-radius: 4px; transition: width 0.4s; }
    .tp-count { font-size: 11px; font-weight: 700; color: #aaa; width: 36px; text-align: right; flex-shrink: 0; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: #2c3e50; color: #fff;
      padding: 12px 22px; border-radius: 14px;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 15px;
      z-index: 1000;
      transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      white-space: nowrap; box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* CONFETTI */
    .confetti-piece {
      position: fixed; top: -14px;
      width: 10px; height: 14px; border-radius: 2px;
      animation: confetti-fall linear forwards;
      z-index: 999; pointer-events: none;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(0) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Polski dla dzieci 🇵🇱</h1>
    <div class="header-sub">Polish for kids</div>
  </div>

  <div class="stats-bar">
    <div class="level-badge" id="levelBadge">⭐ Lv.1</div>
    <div class="xp-bar-wrap">
      <div class="xp-label">
        <span id="levelName">Uczen</span>
        <span id="xpCount">0 / 150 XP</span>
      </div>
      <div class="xp-bar"><div class="xp-bar-fill" id="xpFill" style="width:0%"></div></div>
    </div>
    <div class="streak-badge" id="streakBadge">🔥 0</div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="setMode('flash')">🃏 Cards</button>
    <button class="nav-btn" onclick="setMode('quiz')">🧠 Quiz</button>
    <button class="nav-btn" onclick="setMode('match')">🔗 Match</button>
    <button class="nav-btn" onclick="setMode('scram')">🧩 Scramble</button>
    <button class="nav-btn" onclick="setMode('medals')">🏆 Medals</button>
  </div>

  <div class="topic-bar" id="topicBar"></div>

  <!-- FLASHCARD MODE -->
  <div id="flashMode" class="panel active">
    <div class="card-area">
      <div class="flashcard" onclick="flipCard()" id="flashcard">
        <div class="mastered-star" id="masteredStar">⭐</div>
        <div class="word-pl" id="fPL">—</div>
        <button class="speak-btn" onclick="event.stopPropagation(); speakWord(document.getElementById('fPL').textContent)" title="Pronounce">🔊</button>
        <div class="word-hint" id="fHint"></div>
        <div class="word-en" id="fEN"></div>
        <div class="flip-hint" id="fFlipHint">tap to reveal</div>
      </div>
    </div>
    <div class="card-nav">
      <button onclick="prevCard()">← Back</button>
      <span class="card-counter" id="cardCounter">1 / 1</span>
      <button onclick="nextCard()">Next →</button>
    </div>
    <button class="got-it-btn" id="gotItBtn" onclick="toggleGotIt()">⭐ Mark as learned</button>
  </div>

  <!-- QUIZ MODE -->
  <div id="quizMode" class="panel">
    <div class="quiz-score">
      <span class="score-pill score-right">✓ <span id="qRight">0</span></span>
      <span class="score-pill score-wrong">✗ <span id="qWrong">0</span></span>
    </div>
    <div class="quiz-q" id="quizQ">—</div>
    <div style="text-align:center"><button class="speak-btn" id="quizSpeak" onclick="speakWord(document.getElementById('quizQ').textContent)" title="Pronounce" style="display:none">🔊</button></div>
    <div class="quiz-sub" id="quizSub"></div>
    <div class="quiz-options" id="quizOpts"></div>
    <button class="next-btn" id="quizNext" onclick="nextQuiz()">Next question →</button>
  </div>

  <!-- MATCH MODE -->
  <div id="matchMode" class="panel">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;">
      <div class="match-col-label">Polish</div>
      <div class="match-col-label">English</div>
    </div>
    <div class="match-grid" id="matchGrid"></div>
    <div class="match-result" id="matchResult">Brawo! 🎉 All matched!</div>
    <button class="reset-btn" onclick="resetMatch()">Shuffle new set</button>
  </div>

  <!-- SCRAMBLE MODE -->
  <div id="scramMode" class="panel">
    <div class="quiz-score">
      <span class="score-pill score-right">✓ <span id="sRight">0</span></span>
      <span class="score-pill score-wrong">✗ <span id="sWrong">0</span></span>
    </div>
    <div class="scram-prompt" id="scramPrompt">—</div>
    <div class="scram-sub" id="scramSub">Spell the Polish word</div>
    <div class="scram-answer" id="scramAnswer"></div>
    <div class="scram-bank" id="scramBank"></div>
    <div class="scram-feedback" id="scramFeedback"></div>
    <button class="next-btn" id="scramNext" onclick="nextScramble()">Next word →</button>
  </div>

  <!-- MEDALS MODE -->
  <div id="medalsMode" class="panel">
    <div class="medals-header">
      <h2>🏆 Nagrody</h2>
      <p>Earn medals by learning Polish!</p>
    </div>
    <div class="medals-list" id="medalsList"></div>
    <div class="topic-progress-section">
      <h3>Topic Progress</h3>
      <div id="topicProgressList"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const vocab = {
  greetings: [
    {pl:"Cześć",       en:"Hi / Hello",        hint:"cheshch"},
    {pl:"Dzień dobry", en:"Good morning",       hint:"dyen DOH-bry"},
    {pl:"Dobranoc",    en:"Good night",         hint:"doh-BRAH-nots"},
    {pl:"Do widzenia", en:"Goodbye",            hint:"do vee-DZEN-ya"},
    {pl:"Dziękuję",    en:"Thank you",          hint:"dyen-KOO-yeh"},
    {pl:"Proszę",      en:"Please / Here you go",hint:"PROH-sheh"},
    {pl:"Przepraszam", en:"Sorry / Excuse me",  hint:"psheh-PRAH-shahm"},
    {pl:"Tak",         en:"Yes",                hint:"tahk"},
    {pl:"Nie",         en:"No",                 hint:"nyeh"},
  ],
  numbers: [
    {pl:"Jeden",    en:"One",   hint:"YEH-den"},
    {pl:"Dwa",      en:"Two",   hint:"dvah"},
    {pl:"Trzy",     en:"Three", hint:"tshih"},
    {pl:"Cztery",   en:"Four",  hint:"CHTE-ry"},
    {pl:"Pięć",     en:"Five",  hint:"pyench"},
    {pl:"Sześć",    en:"Six",   hint:"sheshch"},
    {pl:"Siedem",   en:"Seven", hint:"SHEH-dem"},
    {pl:"Osiem",    en:"Eight", hint:"OH-shyem"},
    {pl:"Dziewięć", en:"Nine",  hint:"djeh-VYENCH"},
    {pl:"Dziesięć", en:"Ten",   hint:"djeh-SHENCH"},
  ],
  colours: [
    {pl:"Czerwony",      en:"Red",    hint:"cher-VOH-ny"},
    {pl:"Niebieski",     en:"Blue",   hint:"nyeh-BYEH-skee"},
    {pl:"Zielony",       en:"Green",  hint:"zheh-LOH-ny"},
    {pl:"Żółty",         en:"Yellow", hint:"ZHOOW-ty"},
    {pl:"Czarny",        en:"Black",  hint:"CHAR-ny"},
    {pl:"Biały",         en:"White",  hint:"BYAH-wy"},
    {pl:"Różowy",        en:"Pink",   hint:"ROO-zhoh-vy"},
    {pl:"Pomarańczowy",  en:"Orange", hint:"po-ma-RAHN-choh-vy"},
    {pl:"Fioletowy",     en:"Purple", hint:"fyo-leh-TOH-vy"},
    {pl:"Brązowy",       en:"Brown",  hint:"BRON-zoh-vy"},
  ],
  family: [
    {pl:"Mama",    en:"Mum",     hint:"MAH-ma"},
    {pl:"Tata",    en:"Dad",     hint:"TAH-ta"},
    {pl:"Babcia",  en:"Grandma", hint:"BAB-chya"},
    {pl:"Dziadek", en:"Grandad", hint:"JA-deck"},
    {pl:"Brat",    en:"Brother", hint:"braht"},
    {pl:"Siostra", en:"Sister",  hint:"SHOS-tra"},
    {pl:"Pies",    en:"Dog",     hint:"pyess"},
    {pl:"Kot",     en:"Cat",     hint:"kot"},
  ],
  food: [
    {pl:"Chleb",  en:"Bread",     hint:"hlep"},
    {pl:"Mleko",  en:"Milk",      hint:"MLEH-ko"},

function saveAll() {

    localStorage.setItem('polski_streak',       streakDays);

  } catch(e){}
}

// ── Mastery helpers ──────────────────────────────────────────────────────────

function isMastered(topic, pl) { return !!(mastered[topic] && mastered[topic][pl]); }
function setMastered(topic, pl, val) {
  if (!mastered[topic]) mastered[topic] = {};
  if (val) mastered[topic][pl] = true;
  else delete mastered[topic][pl];
}
function masteredCount(topic) {
  return mastered[topic] ? Object.keys(mastered[topic]).length : 0;
}
function isTopicComplete(topic) {
  return masteredCount(topic) === vocab[topic].length;
}

// ── XP / Level / Streak ─────────────────────────────────────────────────────

function getLevelIndex() {
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].min) return i;
  }
  return 0;
}

function addXP(amount) {
  const prevLevel = getLevelIndex();
  xp += amount;
  touchStreak();
  saveAll();
  updateStatsBar();
  const newLevel = getLevelIndex();
  if (newLevel > prevLevel) {
    showToast(`⭐ Level Up! You are now ${LEVELS[newLevel].name} (Lv.${newLevel + 1})!`);
    launchConfetti();
  }
  checkAchievements();
}

function touchStreak() {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (lastActive === today) return;
  if (lastActive === yesterday) streakDays++;
  else streakDays = 1;
  lastActive = today;
}

function updateStatsBar() {
  const lvlIdx = getLevelIndex();
  const lvl    = LEVELS[lvlIdx];
  const next   = LEVELS[lvlIdx + 1];
  document.getElementById('levelBadge').textContent = `⭐ Lv.${lvlIdx + 1}`;
  document.getElementById('levelName').textContent  = lvl.name;
  if (next) {
    const progress = Math.min(100, ((xp - lvl.min) / (next.min - lvl.min)) * 100);
    document.getElementById('xpFill').style.width   = progress + '%';
    document.getElementById('xpCount').textContent  = `${xp} / ${next.min} XP`;
  } else {
    document.getElementById('xpFill').style.width   = '100%';
    document.getElementById('xpCount').textContent  = `${xp} XP — MAX!`;
  }
  document.getElementById('streakBadge').textContent = `🔥 ${streakDays}`;
}

// ── Achievements ─────────────────────────────────────────────────────────────

function checkAchievements() {
  const completedTopics = topics.filter(t => isTopicComplete(t)).length;
  const checks = [
    {id:'first_learn',  cond: Object.values(mastered).some(t => Object.keys(t).length > 0)},
    {id:'quiz_10',      cond: stats.quizRight  >= 10},
    {id:'scram_5',      cond: stats.scramRight >= 5},
    {id:'match_5',      cond: stats.matchSets  >= 5},
    {id:'topic_master', cond: completedTopics  >= 1},
    {id:'polyglot',     cond: completedTopics  >= 5},
  ];
  checks.forEach(({id, cond}) => {
    if (cond && !achievements[id]) {
      achievements[id] = true;
      const ach = ACHIEVEMENTS.find(a => a.id === id);
      saveAll();
      showToast(`${ach.icon} Medal Unlocked: ${ach.name}!`);
    }
  });
}

// ── Toast & Confetti ─────────────────────────────────────────────────────────

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

function launchConfetti() {
  const colors = ['#c0392b','#27ae60','#3498db','#f39c12','#9b59b6','#e67e22','#1abc9c'];
  for (let i = 0; i < 28; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = (Math.random() * 100) + 'vw';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 3500);
    }, i * 60);
  }
}

// ── Topic bar ────────────────────────────────────────────────────────────────

function buildTopicBar() {
  const bar = document.getElementById('topicBar');
  bar.innerHTML = '';
  topics.forEach(t => {
    const total    = vocab[t].length;
    const done     = masteredCount(t);
    const complete = done === total;
    const pct      = total > 0 ? (done / total * 100) : 0;
    const b = document.createElement('button');
    b.className = 'topic-btn'
      + (t === currentTopic ? ' active' : '')
      + (complete ? ' complete' : '');
    b.innerHTML = `
      <div class="topic-btn-text">
        <span>${topicLabels[t]}</span>
        ${done > 0 ? `<span class="topic-prog-count">${done}/${total}</span>` : ''}
      </div>
      <div class="topic-mini-bar">
        <div class="topic-mini-fill" style="width:${pct}%"></div>
      </div>`;
    b.onclick = () => { currentTopic = t; buildTopicBar(); resetAll(); };
    bar.appendChild(b);
  });
}

function resetAll() {
  cardIdx = 0; cardFlipped = false;
  if (currentMode === 'flash') renderFlash();
  if (currentMode === 'quiz') {
    qRight = 0; qWrong = 0;
    document.getElementById('qRight').textContent = 0;
    document.getElementById('qWrong').textContent = 0;
    quizPool = [];
    nextQuiz();
  }
  if (currentMode === 'match') resetMatch();
  if (currentMode === 'scram') {
    scramRight = 0; scramWrong = 0;
    document.getElementById('sRight').textContent = 0;
    document.getElementById('sWrong').textContent = 0;
    scramPool = [];
    nextScramble();
  }
}

function setMode(m) {
  currentMode = m;
  const modes   = ['flash','quiz','match','scram','medals'];
  modes.forEach((name, i) => {
    document.getElementById(name + 'Mode').classList.toggle('active', name === m);
    document.querySelectorAll('.nav-btn')[i].classList.toggle('active', name === m);
  });
  document.getElementById('topicBar').style.display = m === 'medals' ? 'none' : '';
  if (m === 'medals') renderMedals();
  else resetAll();
}

// ── Shuffle ──────────────────────────────────────────────────────────────────

function speakWord(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'pl-PL';
    u.rate = 0.85;
    const voices = window.speechSynthesis.getVoices();
    const plVoice = voices.find(v => v.lang.startsWith('pl'));
    if (plVoice) u.voice = plVoice;
    window.speechSynthesis.speak(u);
  }, 50);
}

function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── QUIZ ─────────────────────────────────────────────────────────────────────

function nextQuiz() {
  quizAnswered = false;
  document.getElementById('quizNext').style.display = 'none';
  const words = vocab[currentTopic];
  if (quizPool.length === 0) quizPool = shuffle([...words]);
  const current    = quizPool.pop();
  const dirPLtoEN  = Math.random() > 0.5;
  document.getElementById('quizQ').textContent   = dirPLtoEN ? current.pl : current.en;
  document.getElementById('quizSub').textContent = dirPLtoEN ? '(' + current.hint + ')' : 'What is this in Polish?';
  document.getElementById('quizSpeak').style.display = dirPLtoEN ? 'inline-flex' : 'none';
  const wrongs = shuffle(words.filter(w => w.pl !== current.pl)).slice(0, 3);
  const opts   = shuffle([current, ...wrongs]);
  const container = document.getElementById('quizOpts');
  container.innerHTML = '';
  opts.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'quiz-opt';
    b.textContent = dirPLtoEN ? opt.en : opt.pl;
    b.onclick = () => {
      if (quizAnswered) return;
      quizAnswered = true;
      const isRight = opt.pl === current.pl;
      if (isRight) {
        b.classList.add('correct');
        qRight++;
        stats.quizRight++;
        document.getElementById('qRight').textContent = qRight;
        addXP(10);
        showToast('+10 XP — Correct!');
      } else {
        b.classList.add('wrong');
        qWrong++;
        document.getElementById('qWrong').textContent = qWrong;
        Array.from(container.children).forEach(btn => {
          if (btn.textContent === (dirPLtoEN ? current.en : current.pl)) btn.classList.add('reveal');
        });
      }
      Array.from(container.children).forEach(btn => btn.disabled = true);
      document.getElementById('quizNext').style.display = 'block';
      checkAchievements();
    };
    container.appendChild(b);
  });
}

// ── MATCH ────────────────────────────────────────────────────────────────────

function resetMatch() {
  matchSelected = null; matchedCount = 0;
  const words = vocab[currentTopic];
  matchPool = shuffle([...words]).slice(0, 5);
  const polishItems = shuffle([...matchPool]);
  const engItems    = shuffle([...matchPool]);
  const grid = document.getElementById('matchGrid');
  grid.innerHTML = '';
  document.getElementById('matchResult').style.display = 'none';
  const polishCol = document.createElement('div');
  polishCol.className = 'match-col';
  const engCol = document.createElement('div');
  engCol.className = 'match-col';
  polishItems.forEach(w => {
    const b = document.createElement('button');
    b.className = 'match-btn';
    b.textContent = w.pl;
    b.dataset.pl = w.pl; b.dataset.side = 'pl';
    b.onclick = () => handleMatch(b);
    polishCol.appendChild(b);
  });
  engItems.forEach(w => {
    const b = document.createElement('button');
    b.className = 'match-btn';
    b.textContent = w.en;
    b.dataset.pl = w.pl; b.dataset.side = 'en';
    b.onclick = () => handleMatch(b);
    engCol.appendChild(b);
  });
  grid.appendChild(polishCol);
  grid.appendChild(engCol);
}

function handleMatch(btn) {
  if (btn.classList.contains('matched')) return;
  if (!matchSelected) {
    matchSelected = btn; btn.classList.add('selected');
  } else {
    if (matchSelected === btn) { btn.classList.remove('selected'); matchSelected = null; return; }
    if (matchSelected.dataset.side === btn.dataset.side) {
      matchSelected.classList.remove('selected'); matchSelected = btn; btn.classList.add('selected'); return;
    }
    const a = matchSelected;
    if (a.dataset.pl === btn.dataset.pl) {
      a.classList.remove('selected'); a.classList.add('matched'); a.disabled = true;
      btn.classList.add('matched'); btn.disabled = true;
      matchedCount++;
      if (matchedCount === matchPool.length) {
        document.getElementById('matchResult').style.display = 'block';
        stats.matchSets++;
        addXP(25);
        showToast('+25 XP — All matched! Brawo!');
        launchConfetti();
        checkAchievements();
      }
    } else {
      a.classList.add('wrong-shake'); btn.classList.add('wrong-shake');
      setTimeout(() => { a.classList.remove('wrong-shake','selected'); btn.classList.remove('wrong-shake'); }, 400);
    }
    matchSelected = null;
  }
}

// ── SCRAMBLE ─────────────────────────────────────────────────────────────────

function nextScramble() {
  scramAnswered = false;
  document.getElementById('scramNext').style.display = 'none';
  document.getElementById('scramFeedback').textContent = '';
  const allWords = vocab[currentTopic];
  const eligible = allWords.filter(w => !w.pl.includes(' '));
  const words    = eligible.length > 0 ? eligible : allWords;
  if (scramPool.length === 0) scramPool = shuffle([...words]);
  scramWord = scramPool.pop();
  document.getElementById('scramPrompt').textContent = scramWord.en;
  document.getElementById('scramSub').textContent    = 'Spell the Polish word';
  const chars = [...scramWord.pl];
  scramLetters = chars.map((char, id) => ({char, id}));
  let attempts = 0;
  do { scramLetters = shuffle(scramLetters); attempts++; }
  while (attempts < 20 && scramLetters.map(l => l.char).join('') === scramWord.pl);
  scramAnswer = [];
  renderScramble();
}

function renderScramble() {
  const chars = [...scramWord.pl];
  const answerDiv = document.getElementById('scramAnswer');
  answerDiv.innerHTML = '';
  chars.forEach((_, pos) => {
    const slot   = document.createElement('div');
    const filled = pos < scramAnswer.length;
    slot.className = 'scram-slot' + (filled ? ' filled' : '');
    if (filled) {
      slot.textContent = scramLetters.find(l => l.id === scramAnswer[pos]).char;
      if (!scramAnswered) slot.onclick = () => removeFromAnswer(pos);
    }
    answerDiv.appendChild(slot);
  });
  const bankDiv = document.getElementById('scramBank');
  bankDiv.innerHTML = '';
  scramLetters.forEach(letter => {
    const tile = document.createElement('div');
    tile.className = 'scram-tile' + (scramAnswer.includes(letter.id) ? ' used' : '');
    tile.textContent = letter.char;
    tile.onclick = () => addToAnswer(letter.id);
    bankDiv.appendChild(tile);
  });
}

function addToAnswer(id) {
  if (scramAnswered || scramAnswer.includes(id)) return;
  scramAnswer.push(id);
  renderScramble();
  if (scramAnswer.length === [...scramWord.pl].length) checkScramble();
}
function removeFromAnswer(pos) {
  if (scramAnswered) return;
  scramAnswer.splice(pos, 1);
  renderScramble();
}
function checkScramble() {
  scramAnswered = true;
  const typed   = scramAnswer.map(id => scramLetters.find(l => l.id === id).char).join('');
  const correct = typed === scramWord.pl;
  document.getElementById('scramAnswer').querySelectorAll('.scram-slot').forEach(slot => {
    slot.classList.add(correct ? 'correct' : 'wrong-col');
    slot.onclick = null;
  });
  const fb = document.getElementById('scramFeedback');
  if (correct) {
    fb.textContent    = 'Brawo! 🎉';
    fb.style.color    = '#27ae60';
    scramRight++;
    stats.scramRight++;
    document.getElementById('sRight').textContent = scramRight;
    addXP(15);
    showToast('+15 XP — Dobrze! Well spelled!');
  } else {
    fb.textContent  = '✗  ' + scramWord.pl;
    fb.style.color  = '#e74c3c';
    scramWrong++;
    document.getElementById('sWrong').textContent = scramWrong;
  }
  document.getElementById('scramNext').style.display = 'block';
  checkAchievements();
}

// ── MEDALS ───────────────────────────────────────────────────────────────────

function renderMedals() {
  const list = document.getElementById('medalsList');
  list.innerHTML = '';
  ACHIEVEMENTS.forEach(ach => {
    const unlocked = !!achievements[ach.id];
    const card = document.createElement('div');
    card.className = 'medal-card' + (unlocked ? ' unlocked' : '');
    card.innerHTML = `
      <div class="medal-icon">${ach.icon}</div>
      <div>
        <div class="medal-name">${ach.name}</div>
        <div class="medal-desc">${ach.desc}</div>
      </div>`;
    list.appendChild(card);
  });

  const tpList = document.getElementById('topicProgressList');
  tpList.innerHTML = '';
  topics.forEach(t => {
    const total = vocab[t].length;
    const done  = masteredCount(t);
    const pct   = total > 0 ? (done / total * 100) : 0;
    const row   = document.createElement('div');
    row.className = 'tp-row';
    row.innerHTML = `
      <div class="tp-label">${topicLabels[t]}</div>
      <div class="tp-bar-wrap"><div class="tp-bar-fill" style="width:${pct}%"></div></div>
      <div class="tp-count">${done}/${total}</div>`;
    tpList.appendChild(row);
  });
}

// ── Init ─────────────────────────────────────────────────────────────────────

updateStatsBar();
buildTopicBar();
renderFlash();
</script>
